[package]
name = "ducktape"
version = "0.1.0"
edition = "2024"

[workspace]
resolver = "2"
members = [
    "packages/auth",
    "bin",
    "packages/doctree",
    "packages/document",
    "packages/nodes",
    "packages/api",
    "packages/uid",
    "utils", "packages/journal",
]

[workspace.dependencies]
log = "0.4.27"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.141"
thiserror = "2.0.12"
anyhow = "1.0.98"
lazy_static = "1.5.0"
regex = "1.11.1"
poem = "3.1.12"
sha2 = "0.10.9"
rand = "0.9.2"
uuid = { version = "1.11", features = ["v7", "serde"] }

# internal
auth     = { path = "packages/auth" }
api      = { path = "packages/api" }
doctree  = { path = "packages/doctree" }
document = { path = "packages/document" }
journal  = { path = "packages/journal" }
nodes    = { path = "packages/nodes" }
uid      = { path = "packages/uid" }
utils    = { path = "utils" }

[[bin]]
name = "ducktape"
path = "bin/src/main.rs"

[dependencies]
clap = "4.5.45"
tokio = { version = "1.47.1", features = ["full", "rt"] }
api.workspace = true
