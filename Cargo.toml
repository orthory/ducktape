[package]
name = "ducktape"
version = "0.1.0"
edition = "2024"

[workspace]
resolver = "2"
members = ["auth", "bin", "doctree", "document", "tracker"]

[workspace.dependencies]
log = "0.4.27"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.141"
thiserror = "2.0.12"
anyhow = "1.0.98"
lazy_static = "1.5.0"
regex = "1.11.1"

[[bin]]
name = "ducktape"
path = "bin/src/main.rs"
