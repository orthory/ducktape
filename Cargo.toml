[package]
name = "ducktape"
version = "0.1.0"
edition = "2024"

[workspace]
resolver = "2"
members = [
    "constructs/auth",
    "bin",
    "constructs/doctree",
    "constructs/document",
    "api",
    "constructs/tracker", "utils",
]

[workspace.dependencies]
log = "0.4.27"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.141"
thiserror = "2.0.12"
anyhow = "1.0.98"
lazy_static = "1.5.0"
regex = "1.11.1"
poem = "3.1.12"
sha2 = "0.10.9"
rand = "0.9.2"

[[bin]]
name = "ducktape"
path = "bin/src/main.rs"

[dependencies]
clap = "4.5.45"
tokio = { version = "1.47.1", features = ["full", "rt"] }
api = { path = "./api" }
